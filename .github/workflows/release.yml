name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        name: Determine next version
        # Conventional Commits decide the bump from the commit messages
        # since the last release tag:
        #   feat!: â€¦ / any type + BREAKING CHANGE   â†’ major (X+1.0.0)
        #   feat: â€¦                                 â†’ minor (x.Y+1.0)
        #   anything else (fix:, chore:, plain â€¦)   â†’ patch (x.y.Z+1)
        # Highest level among the new commits wins.
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d v)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)

          # Range of commits being released (all of them if no tag yet).
          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            RANGE="${LATEST}..HEAD"
          else
            RANGE="HEAD"
          fi
          SUBJECTS=$(git log --format='%s' $RANGE)
          BODIES=$(git log --format='%B' $RANGE)

          BUMP=patch
          if echo "$SUBJECTS" | grep -qE '^feat(\([^)]+\))?:'; then
            BUMP=minor
          fi
          # major: a "type!:" subject, or a real BREAKING CHANGE footer
          # (line starts with the token + ": "), not a prose mention of it.
          if echo "$SUBJECTS" | grep -qE '^[a-z]+(\([^)]+\))?!:' \
             || echo "$BODIES" | grep -qE '^BREAKING[ -]CHANGE: '; then
            BUMP=major
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          echo "bump=${BUMP} â†’ v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: darwin-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The lockfile is written by npm 11 (lockfileVersion 3); node 20's
      # bundled npm 10.8 crashes reading it ("Exit handler never called").
      # Pull a current npm so `npm ci` matches what generated the lockfile.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # webkit2gtk + friends are what Tauri links against on Linux
      - name: Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev build-essential curl wget file

      - name: Stamp version
        shell: bash
        run: |
          V=${{ needs.version.outputs.version }}
          node -e "const f='package.json',j=require('./'+f);j.version='$V';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          node -e "const f='src-tauri/tauri.conf.json',j=require('./'+f);j.version='$V';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          perl -pi -e "s/^version = \".*\"/version = \"$V\"/ if 1..10" src-tauri/Cargo.toml

      - run: npm ci --registry=https://registry.npmjs.org/
      - run: npm run build
      - run: npm run smoke

      - name: Build app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          V=${{ needs.version.outputs.version }}
          # Collect into out/, NOT dist/ â€” dist/ is vite's web bundle, and
          # sweeping it into the release litters the page with .js/.css/.svg.
          mkdir -p out
          B=src-tauri/target/${{ matrix.target }}/release/bundle
          if [ "${{ runner.os }}" = "macOS" ]; then
            # Ad-hoc sign the whole bundle. Without any signature a
            # quarantined app reads as "damaged" on Apple Silicon (not just
            # "unidentified developer"); an ad-hoc signature makes it a
            # normal Gatekeeper prompt, which the cask's postflight clears.
            codesign --force --deep --sign - "$B/macos/PigeonEye.app"
            codesign --verify --deep --strict "$B/macos/PigeonEye.app" || true
            # ship the .app as a tarball: a cask can install it directly
            tar -czf "out/PigeonEye-${{ matrix.label }}.tar.gz" -C "$B/macos" PigeonEye.app
          else
            find "$B/deb" -name '*.deb' -exec cp {} "out/PigeonEye-${V}-linux-x86_64.deb" \;
            find "$B/appimage" -name '*.AppImage' -exec cp {} "out/PigeonEye-${V}-linux-x86_64.AppImage" \; || true
          fi
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: out/*

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten
        run: mkdir -p dist && find artifacts -type f -exec cp {} dist/ \; && ls -la dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ needs.version.outputs.tag }}
          # Build the changelog from the commits since the previous tag, so
          # the release notes plainly list what changed (commit subjects).
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            NOTES=$(git log --no-merges --pretty='- %s' "${PREV}..HEAD")
          else
            NOTES=$(git log --no-merges --pretty='- %s')
          fi
          [ -z "$NOTES" ] && NOTES="- ${TAG}"
          git tag -d $TAG 2>/dev/null || true
          git push origin :refs/tags/$TAG 2>/dev/null || true
          gh release delete $TAG --yes 2>/dev/null || true
          git tag $TAG
          git push origin $TAG
          printf 'What changed in %s:\n\n%s\n' "$TAG" "$NOTES" > /tmp/notes.md
          gh release create $TAG dist/* --title "$TAG" --notes-file /tmp/notes.md

      # The cask lives in the tap repo (tackish/homebrew-pigeoneye) so that
      # `brew tap tackish/pigeoneye` resolves without a URL. Push the freshly
      # built shas there over a write-scoped deploy key (TAP_DEPLOY_KEY).
      - name: Update Homebrew tap
        env:
          DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          V=${{ needs.version.outputs.version }}
          ARM=$(sha256sum dist/PigeonEye-darwin-arm64.tar.gz | awk '{print $1}')
          AMD=$(sha256sum dist/PigeonEye-darwin-x86_64.tar.gz | awk '{print $1}')
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"
          git clone git@github.com:tackish/homebrew-pigeoneye.git tap
          python3 scripts/update-cask.py "$V" "$ARM" "$AMD" tap/Casks/peye.rb
          cd tap
          git config user.name "Tek"
          git config user.email "tackish@nate.com"
          git add Casks/peye.rb
          git commit -m "peye: update to ${V}" || { echo "cask unchanged"; exit 0; }
          git push origin HEAD:main
